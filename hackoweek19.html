  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    * { box-sizing: border-box; }
    
    body {
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
      font-family: 'Poppins', sans-serif;
      color: #e0e0e0;
    }
    
    .player-container {
      background: #1a1a2e;
      border: 1px solid #2d2d44;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(76, 175, 80, 0.1);
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    
    .player-header {
      background: linear-gradient(135deg, #1e1e3f 0%, #2d1b4e 100%);
      color: #e0e0e0;
      padding: 20px 24px;
      font-weight: 700;
      font-size: 18px;
      border-bottom: 1px solid #2d2d44;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .header-icon {
      width: 24px;
      height: 24px;
      color: #4caf50;
    }
    
    .now-playing-section {
      background: linear-gradient(180deg, #2d1b4e 0%, #1a1a2e 100%);
      padding: 24px;
      border-bottom: 1px solid #2d2d44;
      text-align: center;
    }
    
    .album-art {
      width: 140px;
      height: 140px;
      background: linear-gradient(135deg, #4caf50 0%, #7c3aed 100%);
      border-radius: 12px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      box-shadow: 0 10px 30px rgba(76, 175, 80, 0.2);
    }
    
    .song-title {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 4px;
    }
    
    .song-artist {
      font-size: 13px;
      color: #b0b0b0;
    }
    
    .controls-section {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid #2d2d44;
      flex-wrap: wrap;
    }
    
    .control-input-group {
      display: flex;
      gap: 8px;
      flex: 1;
      min-width: 250px;
    }
    
    .song-input {
      flex: 1;
      background: #2d2d44;
      border: 1px solid #3d3d54;
      color: #e0e0e0;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
    }
    
    .song-input:focus {
      outline: none;
      border-color: #4caf50;
      box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
    }
    
    .song-input::placeholder {
      color: #6d6d7d;
    }
    
    .control-btn {
      background: #4caf50;
      color: #000;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Poppins', sans-serif;
    }
    
    .control-btn:hover {
      background: #5cbd61;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
    }
    
    .control-btn.secondary {
      background: #7c3aed;
      color: #fff;
    }
    
    .control-btn.secondary:hover {
      background: #8e44ad;
    }
    
    .control-btn.danger {
      background: #ef4444;
      color: #fff;
    }
    
    .control-btn.danger:hover {
      background: #f87171;
    }
    
    .playlist-section {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }
    
    .playlist-title {
      font-size: 14px;
      font-weight: 700;
      color: #4caf50;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2d2d44;
    }
    
    .songs-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .song-card {
      background: #2d2d44;
      border: 1px solid #3d3d54;
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    
    .song-card:hover {
      background: #3d3d54;
      border-color: #4caf50;
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.15);
    }
    
    .song-card.playing {
      background: linear-gradient(135deg, #2d1b4e 0%, #3d2d54 100%);
      border-color: #7c3aed;
      box-shadow: 0 0 16px rgba(124, 58, 237, 0.3);
    }
    
    .song-info {
      flex: 1;
      min-width: 0;
    }
    
    .song-name {
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 2px;
    }
    
    .song-index {
      font-size: 11px;
      color: #8d8d9d;
    }
    
    .song-links {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    .link-arrow {
      font-size: 12px;
      color: #4caf50;
      font-weight: 700;
    }
    
    .delete-btn {
      background: #ef4444;
      color: white;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    
    .delete-btn:hover {
      background: #f87171;
      transform: scale(1.1);
    }
    
    .empty-playlist {
      text-align: center;
      padding: 40px 20px;
      color: #6d6d7d;
    }
    
    .empty-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      opacity: 0.5;
    }
    
    .status-bar {
      background: #2d2d44;
      border-top: 1px solid #3d3d54;
      padding: 12px 24px;
      font-size: 11px;
      color: #8d8d9d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .status-badge {
      background: #4caf50;
      color: #000;
      padding: 4px 10px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 10px;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .song-card {
      animation: slideIn 0.3s ease;
    }
    
    ::-webkit-scrollbar {
      width: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #1a1a2e;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #4caf50;
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #5cbd61;
    }
  </style>

 <body class="h-full flex items-center justify-center p-4">
  <div class="player-container" style="max-width: 500px; width: 100%;"><!-- Header -->
   <div class="player-header"><i data-lucide="music" class="header-icon"></i> <span id="playlistTitle">Vibes Mix</span>
   </div><!-- Now Playing -->
   <div class="now-playing-section">
    <div class="album-art">
     🎵
    </div>
    <div class="song-title" id="nowPlayingTitle">
     No Song Playing
    </div>
    <div class="song-artist" id="nowPlayingArtist">
     Add songs to get started
    </div>
   </div><!-- Controls -->
   <div class="controls-section">
    <div class="control-input-group"><input type="text" class="song-input" id="songInput" placeholder="Enter song name..."> <button class="control-btn" id="addFrontBtn"> <i data-lucide="plus" style="width: 14px; height: 14px;"></i> Front </button> <button class="control-btn secondary" id="addEndBtn"> <i data-lucide="plus" style="width: 14px; height: 14px;"></i> End </button>
    </div><button class="control-btn secondary" id="shuffleBtn" style="width: 100%;"> <i data-lucide="shuffle" style="width: 14px; height: 14px;"></i> Shuffle (Reverse) </button>
   </div><!-- Playlist -->
   <div class="playlist-section">
    <div class="playlist-title">
     Queue
    </div>
    <div class="songs-container" id="songsContainer">
     <div class="empty-playlist"><i data-lucide="music" class="empty-icon"></i>
      <p>Playlist is empty</p>
      <p style="font-size: 11px; margin-top: 8px;">Add songs to begin</p>
     </div>
    </div>
   </div><!-- Status -->
   <div class="status-bar"><span id="songCount">0 songs</span> <span class="status-badge" id="statusBadge">Ready</span>
   </div>
  </div>
  <script>
    // Doubly Linked List Node
    class Node {
      constructor(data) {
        this.data = data;
        this.prev = null;
        this.next = null;
      }
    }
    
    // Doubly Linked List
    class DoublyLinkedList {
      constructor() {
        this.head = null;
        this.tail = null;
        this.size = 0;
      }
      
      addFront(data) {
        const node = new Node(data);
        if (this.size === 0) {
          this.head = this.tail = node;
        } else {
          node.next = this.head;
          this.head.prev = node;
          this.head = node;
        }
        this.size++;
      }
      
      addEnd(data) {
        const node = new Node(data);
        if (this.size === 0) {
          this.head = this.tail = node;
        } else {
          node.prev = this.tail;
          this.tail.next = node;
          this.tail = node;
        }
        this.size++;
      }
      
      removeAt(index) {
        if (index < 0 || index >= this.size) return null;
        let current;
        if (index === 0) {
          current = this.head;
          this.head = this.head.next;
          if (this.head) this.head.prev = null;
        } else if (index === this.size - 1) {
          current = this.tail;
          this.tail = this.tail.prev;
          if (this.tail) this.tail.next = null;
        } else {
          current = this.head;
          for (let i = 0; i < index; i++) {
            current = current.next;
          }
          current.prev.next = current.next;
          current.next.prev = current.prev;
        }
        this.size--;
        return current.data;
      }
      
      reverse() {
        let current = this.head;
        let temp = null;
        while (current) {
          temp = current.prev;
          current.prev = current.next;
          current.next = temp;
          current = current.prev;
        }
        temp = this.head;
        this.head = this.tail;
        this.tail = temp;
      }
      
      toArray() {
        const arr = [];
        let current = this.head;
        while (current) {
          arr.push(current.data);
          current = current.next;
        }
        return arr;
      }
    }
    
    // Initialize playlist
    let playlist = new DoublyLinkedList();
    let currentPlayingIndex = -1;
    
    // Sample songs
    const sampleSongs = ['Midnight Dreams', 'Electric Soul', 'Cosmic Journey', 'Digital Pulse', 'Neon Nights'];
    
    function renderPlaylist() {
      const container = document.getElementById('songsContainer');
      const songs = playlist.toArray();
      
      if (songs.length === 0) {
        container.innerHTML = `
          <div class="empty-playlist">
            <i data-lucide="music" class="empty-icon"></i>
            <p>Playlist is empty</p>
            <p style="font-size: 11px; margin-top: 8px;">Add songs to begin</p>
          </div>
        `;
      } else {
        container.innerHTML = songs.map((song, index) => `
          <div class="song-card ${index === currentPlayingIndex ? 'playing' : ''}" data-index="${index}" onclick="playSong(${index})">
            <div class="song-info">
              <div class="song-name">${song}</div>
              <div class="song-index">#${index + 1} • Doubly Linked</div>
            </div>
            <div class="song-links">
              ${index > 0 ? '<span class="link-arrow">←</span>' : ''}
              ${index < songs.length - 1 ? '<span class="link-arrow">→</span>' : ''}
            </div>
            <button class="delete-btn" onclick="deleteSong(event, ${index})">
              <i data-lucide="trash-2" style="width: 14px; height: 14px;"></i>
            </button>
          </div>
        `).join('');
      }
      
      document.getElementById('songCount').textContent = `${songs.length} song${songs.length !== 1 ? 's' : ''}`;
      lucide.createIcons();
    }
    
    function addSong(position) {
      const input = document.getElementById('songInput');
      const songName = input.value.trim();
      
      if (!songName) {
        document.getElementById('statusBadge').textContent = 'Enter a song name';
        return;
      }
      
      if (position === 'front') {
        playlist.addFront(songName);
        document.getElementById('statusBadge').textContent = 'Added to front';
      } else {
        playlist.addEnd(songName);
        document.getElementById('statusBadge').textContent = 'Added to end';
      }
      
      input.value = '';
      renderPlaylist();
      updateNowPlaying();
    }
    
    function deleteSong(event, index) {
      event.stopPropagation();
      playlist.removeAt(index);
      if (currentPlayingIndex === index) {
        currentPlayingIndex = -1;
      } else if (currentPlayingIndex > index) {
        currentPlayingIndex--;
      }
      renderPlaylist();
      updateNowPlaying();
      document.getElementById('statusBadge').textContent = 'Song removed';
    }
    
    function playSong(index) {
      currentPlayingIndex = index;
      renderPlaylist();
      updateNowPlaying();
    }
    
    function updateNowPlaying() {
      const songs = playlist.toArray();
      if (currentPlayingIndex >= 0 && currentPlayingIndex < songs.length) {
        document.getElementById('nowPlayingTitle').textContent = songs[currentPlayingIndex];
        document.getElementById('nowPlayingArtist').textContent = `Track ${currentPlayingIndex + 1} of ${songs.length}`;
        document.getElementById('statusBadge').textContent = '▶ Playing';
      } else {
        document.getElementById('nowPlayingTitle').textContent = 'No Song Playing';
        document.getElementById('nowPlayingArtist').textContent = 'Add songs to get started';
        document.getElementById('statusBadge').textContent = 'Ready';
      }
    }
    
    function shufflePlaylist() {
      if (playlist.size === 0) {
        document.getElementById('statusBadge').textContent = 'Playlist is empty';
        return;
      }
      playlist.reverse();
      currentPlayingIndex = -1;
      renderPlaylist();
      updateNowPlaying();
      document.getElementById('statusBadge').textContent = 'Playlist reversed!';
    }
    
    // Event listeners
    document.getElementById('addFrontBtn').addEventListener('click', () => addSong('front'));
    document.getElementById('addEndBtn').addEventListener('click', () => addSong('end'));
    document.getElementById('shuffleBtn').addEventListener('click', shufflePlaylist);
    
    document.getElementById('songInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        addSong('end');
      }
    });
    
    // Element SDK
    const defaultConfig = {
      playlist_title: 'Vibes Mix',
      add_song_placeholder: 'Enter song name...',
      primary_color: '#4caf50',
      secondary_color: '#7c3aed',
      background_color: '#1a1a2e',
      text_color: '#e0e0e0',
      font_family: 'Poppins',
      font_size: 13
    };
    
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const c = { ...defaultConfig, ...config };
        document.getElementById('playlistTitle').textContent = c.playlist_title;
        document.getElementById('songInput').placeholder = c.add_song_placeholder;
        
        // Apply colors
        document.documentElement.style.setProperty('--primary-color', c.primary_color);
        document.documentElement.style.setProperty('--secondary-color', c.secondary_color);
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
          { get: () => config.secondary_color || defaultConfig.secondary_color, set: (v) => { config.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['playlist_title', config.playlist_title || defaultConfig.playlist_title],
        ['add_song_placeholder', config.add_song_placeholder || defaultConfig.add_song_placeholder]
      ])
    });
    
    // Initialize
    renderPlaylist();
    updateNowPlaying();
    lucide.createIcons();
  </script>
