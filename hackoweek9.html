  <style>
    * { font-family: 'Quicksand', sans-serif; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    .weather-card {
      animation: fadeInUp 0.6s ease-out forwards;
      opacity: 0;
    }
    
    .weather-card:nth-child(1) { animation-delay: 0.1s; }
    .weather-card:nth-child(2) { animation-delay: 0.25s; }
    .weather-card:nth-child(3) { animation-delay: 0.4s; }
    
    .weather-icon {
      animation: float 3s ease-in-out infinite;
    }
    
    .weather-card:nth-child(2) .weather-icon { animation-delay: 0.5s; }
    .weather-card:nth-child(3) .weather-icon { animation-delay: 1s; }
    
    .gradient-bg {
      background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%);
    }
    
    .card-gradient {
      background: linear-gradient(180deg, #ffffff 0%, #f0f9ff 100%);
    }
    
    .header-text {
      background: linear-gradient(135deg, #0369a1 0%, #0284c7 50%, #0ea5e9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

  <script>
    const defaultConfig = {
      main_title: "Simple Weather Info Panel",
      subtitle: "Static Weather Dashboard",
      footer_text: "Demo Weather Panel – Static Data Only",
      background_color: "#bae6fd",
      card_color: "#ffffff",
      text_color: "#0c4a6e",
      accent_color: "#0284c7",
      secondary_color: "#64748b",
      font_family: "Quicksand",
      font_size: 16
    };

    async function onConfigChange(config) {
      const mainTitle = document.getElementById('main-title');
      const subtitle = document.getElementById('subtitle');
      const footerText = document.getElementById('footer-text');

      if (mainTitle) mainTitle.textContent = config.main_title || defaultConfig.main_title;
      if (subtitle) subtitle.textContent = config.subtitle || defaultConfig.subtitle;
      if (footerText) footerText.textContent = config.footer_text || defaultConfig.footer_text;

      // Apply colors
      const bgColor = config.background_color || defaultConfig.background_color;
      const cardColor = config.card_color || defaultConfig.card_color;
      const textColor = config.text_color || defaultConfig.text_color;
      const accentColor = config.accent_color || defaultConfig.accent_color;
      const secondaryColor = config.secondary_color || defaultConfig.secondary_color;

      document.getElementById('app-wrapper').style.background = `linear-gradient(135deg, ${bgColor}20 0%, ${bgColor} 50%, ${bgColor}dd 100%)`;

      document.querySelectorAll('.weather-card').forEach(card => {
        card.style.background = `linear-gradient(180deg, ${cardColor} 0%, ${bgColor}30 100%)`;
      });

      document.querySelectorAll('.weather-card h2').forEach(el => el.style.color = textColor);
      
      if (subtitle) subtitle.style.color = accentColor;
      if (footerText) footerText.style.color = accentColor;

      // Apply font
      const fontFamily = config.font_family || defaultConfig.font_family;
      const baseSize = config.font_size || defaultConfig.font_size;
      document.body.style.fontFamily = `${fontFamily}, sans-serif`;

      if (mainTitle) mainTitle.style.fontSize = `${baseSize * 2.5}px`;
      if (subtitle) subtitle.style.fontSize = `${baseSize * 1.125}px`;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => { config.background_color = value; window.elementSdk.setConfig({ background_color: value }); }
          },
          {
            get: () => config.card_color || defaultConfig.card_color,
            set: (value) => { config.card_color = value; window.elementSdk.setConfig({ card_color: value }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (value) => { config.accent_color = value; window.elementSdk.setConfig({ accent_color: value }); }
          },
          {
            get: () => config.secondary_color || defaultConfig.secondary_color,
            set: (value) => { config.secondary_color = value; window.elementSdk.setConfig({ secondary_color: value }); }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => { config.font_family = value; window.elementSdk.setConfig({ font_family: value }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (value) => { config.font_size = value; window.elementSdk.setConfig({ font_size: value }); }
        }
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ["main_title", config.main_title || defaultConfig.main_title],
        ["subtitle", config.subtitle || defaultConfig.subtitle],
        ["footer_text", config.footer_text || defaultConfig.footer_text]
      ]);
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
  </script>
